services:
  proxcenter:
    environment:
      PROXMOXCENTER_CLOUD_OAUTH_MODE: central
      PROXMOXCENTER_CLOUD_OAUTH_BROKER_ORIGIN: http://localhost:3100

  proxcenter-broker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxcenter-broker
    ports:
      - "3100:3000"
    environment:
      PROXMOXCENTER_PUBLIC_ORIGIN: http://localhost:3100
      PROXMOXCENTER_CLOUD_OAUTH_MODE: local
      PROXMOXCENTER_CLOUD_OAUTH_BROKER_ONEDRIVE_CLIENT_ID: "${PROXMOXCENTER_CLOUD_OAUTH_BROKER_ONEDRIVE_CLIENT_ID:-}"
      PROXMOXCENTER_CLOUD_OAUTH_BROKER_ONEDRIVE_CLIENT_SECRET: "${PROXMOXCENTER_CLOUD_OAUTH_BROKER_ONEDRIVE_CLIENT_SECRET:-}"
      PROXMOXCENTER_CLOUD_OAUTH_BROKER_ONEDRIVE_AUTHORITY: "${PROXMOXCENTER_CLOUD_OAUTH_BROKER_ONEDRIVE_AUTHORITY:-consumers}"
      PROXMOXCENTER_CLOUD_OAUTH_BROKER_GDRIVE_CLIENT_ID: "${PROXMOXCENTER_CLOUD_OAUTH_BROKER_GDRIVE_CLIENT_ID:-}"
      PROXMOXCENTER_CLOUD_OAUTH_BROKER_GDRIVE_CLIENT_SECRET: "${PROXMOXCENTER_CLOUD_OAUTH_BROKER_GDRIVE_CLIENT_SECRET:-}"
    restart: unless-stopped
